[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate --schema=./schema.prisma"

[deploy]
preDeployCommand = "npx prisma migrate deploy --schema=./schema.prisma && node seed.js"
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
PORT = "8080"
